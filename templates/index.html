<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PostPilot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>✈️ PostPilot</h1>
        <p>Paste your content, pick a platform, generate your post.</p>

        <textarea id="content" placeholder="Paste your content here..."></textarea>

        <select id="platform">
            <option value="linkedin">LinkedIn</option>
            <option value="twitter">Twitter/X</option>
            <option value="instagram">Instagram</option>
        </select>

        <button onclick="generatePost()">Generate Post ✨</button>

        <div id="output" class="output-box" style="display:none;">
            <h3>Your Generated Post:</h3>
            <p id="result-text"></p>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
